name: ai-quality-intelligence

services:
  backend:
    image: ${BACKEND_IMAGE:-ai-quality-backend:local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      REAL_DATA_FILE: /app/data/processed/seed_real_clean (1).json
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  ui:
    image: ${UI_IMAGE:-ai-quality-ui:local}
    build:
      context: .
      dockerfile: UI/Dockerfile
      args:
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        # Empty means browser requests use /api on the same origin via gateway.
        VITE_BACKEND_API_URL: ${DOCKER_PUBLIC_BACKEND_URL:-}
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      BACKEND_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${UI_PORT:-5174}:8080"
    depends_on:
      backend:
        condition: service_healthy
      ui:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
