services:
  - type: web
    name: ai-quality-backend
    env: python
    buildCommand: pip install -r pipeline/requirements.txt
    startCommand: cd pipeline && uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
